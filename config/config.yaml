# 数据参数
data:
  dataset_name: "DatasetMixed"
  train_txt: "../../dataset/NOIZEUS/train_dataset.txt"
  val_txt: "../../dataset/NOIZEUS/test_dataset.txt"
  train_limit: null
  val_limit: null
  sample_rate: 8000
  segment_seconds: 3.0
  segment_mode: "random_crop"                # 可选 "random_crop" 或 "pad"

# STFT 参数
stft:
  n_fft: 512
  hop_length: 128
  win_length: 512
  window: "hann_window"

# 模型参数
model:
  name: "unet"                           # 目前支持 "unet"
  unet:
    in_channels: 1
    out_channels: 1
    features: [64, 128, 256, 512]
    time_pooling: [2, 2, 2, 2]
    freq_pooling: [2, 2, 2, 2]
    decode_mode: "interpolate"           # 可选"interpolate"或"transposed_conv"

# 训练参数
training:
  device: "cpu"                          # 'cuda'或 "cpu"
  batch_size: 32
  epochs: 10
  lr: 0.001
  weight_decay: 1e-5
  loss: "si_snr"                            # 可选 "mse", "si_snr", "MR_STFT", "Mel"
  num_workers: 16
  log_interval: 10
  save_interval: 2
  checkpoint_dir: "./checkpoints/si_snr"
  resume: null
  preload: null